server {
    listen 80;
    server_name localhost;

    # Reverse-proxy /api/* to the backend Fly app. This replaces the Vite dev
    # proxy (see frontend/vite.config.ts) so the app's existing relative
    # fetch('/api/...') calls keep working unchanged in production, and the
    # browser never makes a cross-origin request — no CORS config needed.
    #
    # If you rename the backend Fly app, update this hostname to match.
    location /api/ {
        proxy_pass https://building3d-backend.fly.dev/api/;
        proxy_set_header Host building3d-backend.fly.dev;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

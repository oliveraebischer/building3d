# Generated for `fly launch` / `fly deploy` — adjust app name/region as needed.
app = "building3d-backend"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "building3d_data"
  destination = "/app/data"
